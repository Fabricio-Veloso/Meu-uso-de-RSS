services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: uso-melhor-da-internet-freshrss
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      TZ: America/Sao_Paulo
      CRON_MIN: "*/20"
    volumes:
      - ./data:/var/www/FreshRSS/data
      - ./extensions:/var/www/FreshRSS/extensions

  discord-rss:
    build:
      context: ../../tools/discord-rss
    container_name: uso-melhor-da-internet-discord-rss
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN_FILE: /run/secrets/discord_bot_token
      PORT: "8090"
      FEED_SITE_URL: http://discord-rss:8090
      DATA_FILE: /app/data/messages.json
      CHANNELS_FILE: /app/channels.json
    secrets:
      - discord_bot_token
    ports:
      - "8090:8090"
    volumes:
      - ../../tools/discord-rss/data:/app/data

secrets:
  discord_bot_token:
    file: ../../tools/discord-rss/discord_token.txt
